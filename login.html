<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ShopEasy</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <nav class="navbar">
        <div class="nav-brand">🛒 ShopEasy</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="products.html">Products</a></li>
            <li><a href="cart.html">Cart <span class="cart-count">0</span></a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="about.html">About</a></li>
        </ul>
    </nav>

    <section class="section">
        <div class="auth-container">

            <!-- TAB BUTTONS to switch between Login and Register -->
            <div class="auth-tabs">
                <button class="tab-btn active" onclick="showTab('login')">Login</button>
                <button class="tab-btn" onclick="showTab('register')">Register</button>
            </div>

            <!-- LOGIN FORM -->
            <div id="login-tab" class="auth-form">
                <h2>Welcome Back</h2>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="login-email" placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" placeholder="Your password">
                </div>
                <button class="btn-primary" onclick="loginUser()">Login</button>
                <p id="login-msg" class="form-msg"></p>
            </div>

            <!-- REGISTER FORM -->
            <div id="register-tab" class="auth-form" style="display:none;">
                <h2>Create Account</h2>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="reg-name" placeholder="Your name">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="reg-email" placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="reg-password" placeholder="Choose a password">
                </div>
                <button class="btn-primary" onclick="registerUser()">Create Account</button>
                <p id="register-msg" class="form-msg"></p>
            </div>

        </div>
    </section>

    <footer class="footer">
        <p>&copy; 2025 ShopEasy. All rights reserved.</p>
    </footer>

    <script src="js/main.js"></script>
</body>

</html>
